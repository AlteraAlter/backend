events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Proxy all regular HTTP requests to Django ASGI app.
        location / {
            proxy_pass http://django:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Large timeouts for long-running operations.
            proxy_connect_timeout 999999s;
            proxy_send_timeout 999999s;
            proxy_read_timeout 999999s;
            send_timeout 999999s;
            client_max_body_size 50M;
        }

        # WebSocket upgrade path for Django Channels.
        location /ws/ {
            proxy_pass http://django:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_connect_timeout 999999s;
            proxy_send_timeout 999999s;
            proxy_read_timeout 999999s;
            send_timeout 999999s;
        }

        # Public media files path.
        location /media/ {
            alias /media/images/;
        }
    }
}
