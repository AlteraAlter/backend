worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    # Preserve original scheme when behind another proxy.
    map $http_x_forwarded_proto $proxy_xfp {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    # Preserve original client IP when behind another proxy.
    map $http_x_real_ip $proxy_xri {
        default $http_x_real_ip;
        "" $remote_addr;
    }

    upstream django_upstream {
        server django:8000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;

        # Frontend SPA
        location / {
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
        }

        # API
        location /api/ {
            proxy_pass http://django_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $proxy_xri;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_xfp;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Django admin (if used)
        location /admin/ {
            proxy_pass http://django_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $proxy_xri;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_xfp;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # WebSocket (Django Channels)
        location /ws/ {
            proxy_pass http://django_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $proxy_xri;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_xfp;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        # Static files (optional)
        location /static/ {
            alias /app/static/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Media files
        location /media/ {
            alias /app/media/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Temporary uploaded product images for cross-service access
        location /upload-images/ {
            alias /app/media/upload-images/;
            access_log off;
            expires 30m;
            add_header Cache-Control "public, max-age=1800";
        }
    }
}
