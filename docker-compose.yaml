services:
  # Django app (ASGI) that serves REST and WebSocket endpoints.
  django:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: kaufland_django
    restart: unless-stopped
    volumes:
      # Source bind mount for local development (live code changes).
      - .:/app
      # SSH keys for remote file operations used by project services.
      - /home/altera/.ssh:/root/.ssh:ro
      # Shared directory with host assets/files.
      - /srv/kaufland:/srv/kaufland
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kaufland_network
    command: >
      # Apply migrations on startup, then run ASGI server.
      sh -c "python manage.py migrate &&
            uvicorn kaufland_API.asgi:application --host 0.0.0.0 --port 8000 --reload"

  # PostgreSQL database used by Django ORM.
  postgres:
    image: postgres:17.1
    restart: unless-stopped
    container_name: kaufland_postgres
    env_file:
      - .env.docker
    ports:
    - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Service is healthy only when DB accepts connections.
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kaufland_network

  # Redis is used by Channels (WebSocket layer / pub-sub).
  redis:
    image: redis:7
    restart: unless-stopped
    container_name: kaufland_redis
    networks:
      - kaufland_network
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]

  # Nginx reverse proxy exposed to host machine.
  nginx:
    image: nginx:latest
    restart: unless-stopped
    container_name: kaufland_nginx
    ports:
      - "8050:80"
    volumes:
      # Main reverse proxy config.
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Project static source (for local serving if needed).
      - ./static:/app/static
      # Shared media files generated by app.
      - media_volume:/app/media
    depends_on:
      django:
        condition: service_started
    networks:
      - kaufland_network

volumes:
  # Named volume for media files.
  media_volume:
  # Persistent PostgreSQL data volume.
  postgres_data:
  # Reserved static volume (kept for future usage).
  static_files:

networks:
  kaufland_network:
    driver: bridge
